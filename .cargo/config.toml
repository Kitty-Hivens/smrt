# ts-rs writes the generated TypeScript bindings under
# $TS_RS_EXPORT_DIR/bindings/ (each type's `#[ts(export_to = "bindings/")]`).
# Pinning it here means a plain `cargo test` regenerates web/src/lib/bindings/
# in place -- no manual env var, no stray ./bindings at the crate root.
[env]
TS_RS_EXPORT_DIR = "web/src/lib"
