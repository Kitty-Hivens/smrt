# Industrial pack -- pack-level rich metadata.
#
# Merged into summary.json by:
#   smrt-pack build \
#       --config    Industrial.json \
#       --pack-meta examples/industrial/pack-meta.toml \
#       ...
#
# Every field optional; absent fields stay out of summary.json
# (per `skip_serializing_if` on PackSummary in src/types.rs).
# Launcher renders sensible fallbacks for missing fields:
#   - icon_url   absent -> letter avatar derived from pack name
#   - banner_url absent -> mirror-gradient placeholder
#   - gallery_urls empty -> no gallery scroller
#   - description_md absent -> tagline only on PackDetail About

# Square icon for the launcher's Browse list + PackDetail hero.
# 256x256 PNG preferred. Drop the file under
#   packs/Industrial/static/_nexira/icon.png
# on the VPS (via `upload-static.py` or the admin API) and the URL
# below resolves naturally.
icon_url = "https://smrt.hivens.dev/v1/packs/Industrial/static/_nexira/icon.png"

# Wide hero banner. 1920x540ish, JPG or PNG. Same _nexira/ subdir
# convention as the icon so the curator has one place to put pack
# branding assets without polluting the mod / config asset namespace.
banner_url = "https://smrt.hivens.dev/v1/packs/Industrial/static/_nexira/banner.png"

# Marketing screenshots. Renders as a horizontal scroller below the
# About section on PackDetail. 1280x720 per image. Empty array =
# no scroller rendered.
gallery_urls = [
    # "https://smrt.hivens.dev/v1/packs/Industrial/static/_nexira/screen1.png",
    # "https://smrt.hivens.dev/v1/packs/Industrial/static/_nexira/screen2.png",
]

# Long-form pack description. CommonMark; rendered through
# multiplatform-markdown-m3 on the launcher side. HTML is not parsed
# (any `<...>` is shown as literal text), so this stays plain text +
# CommonMark structures only.
description_md = """
# Industrial

SmartyCraft's `Industrial` pack delivered via the Hivens mirror.
Heavy industrial automation built on IndustrialCraft 2, Applied
Energistics 2, BuildCraft, and the Thermal Series (Expansion /
Dynamics / Innovation / Cultivation / Foundation). Eight years of
accumulated server progression behind it.

## Why mirror

SmartyCraft authenticates per asset operation. With 2FA on, that's
3-10 round-trips per session -- effectively unusable. The Hivens
mirror absorbs the read-only ops (server list, manifest, file
delivery), so the user authenticates exactly once at game-join.

The proprietary `Smarty-1.12.2.jar` coremod is replaced with the
clean-room `open-smrt-network` -- same wire protocol, no post-join
client surveillance scan.

## Tech baseline

- Minecraft 1.12.2 + Forge 14.23.5.2922
- Java 8 (BellSoft Liberica bundled by Nexira)
- ~90 mods, ~131 assets (configs / shaderpacks / resourcepacks)

## Status

`v8: cozy additions` -- alpha-tier mirror coverage. Industrial is the
sole pack on the mirror today; everything else still flows through
the SC CDN via the launcher's legacy dashboard path.
"""
