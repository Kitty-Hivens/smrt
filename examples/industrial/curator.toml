"ichunutil"               = "7.2.0"
"ironchest"               = "1.12.2-7.0.72.847"
"malisiscore"             = "1.12.2-6.5.1-SNAPSHOT"
"malisisdoors"            = "1.12.2-7.3.0"
"microblockcbe"           = "2.6.2.83"
"minecraftmultipartcbe"   = "2.6.2.83"
