# SC's own build script leaves nbtedit's version field as the
# literal "$version" placeholder unsubstituted, and SC sends the
# placeholder verbatim on the wire. Reproduce byte-for-byte;
# substituting a real version makes the handshake mismatch.
"nbtedit"                 = "$version"
"potioncore"              = "1.9_for_1.12.2"
