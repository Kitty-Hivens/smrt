# ── drop_assets: stripped from the wire manifest ─────────────────────────
# SC's archive ships ~80 mod-default config files that every Forge mod
# regenerates from its own jar resources on first launch (foamfix.cfg,
# chisel.cfg, AE2's items.csv item-dump, stale CoFH world JSONs,
# JustEnoughResources' world-gen.json scan, etc). Shipping the defaults
# pre-baked locks every install into "SC's choice = mod default" and
# means mod updates that introduce new config fields cannot evolve
# cleanly. Paths below were triaged 2026-05-26 against a live VPS dump
# of static/ -- each one verified as a mod-default or auto-generated
# debug artifact, never a SC tweak.
#
# Drops are applied by apply-curator's drop pass and stripped from
# PackConfig.assets[] before build writes the manifest. Modrinth-
# sourced extras (resource packs, shaders) and smrt_cache entries are
# never matched even if their dest accidentally collides -- the filter
# keys on source.type == "smrt_static".
#
# Adding to this list: confirm the file is byte-for-byte a mod default
# (`diff <(unzip -p mod.jar assets/<modid>/<path>) live-static-file`)
# OR is an auto-generated debug dump that the mod regenerates on demand.
# Do NOT drop files with even one tweaked field; the operator's intent
# is unrecoverable from the manifest once the file is stripped.

[drop_assets]
paths = [
    # Smarty mod (substituted with open-smrt-network) -- OSN doesn't
    # read this file; the only setting is FatRussianFont toggle.
    "config/Smarty.cfg",

    # Auto-generated debug dumps -- regenerated by their producer mods
    # on first launch.
    "config/AppliedEnergistics2/items.csv",      # AE2 item-localisation CSV dump (829 KB!)
    "config/UniqueNames.txt",                    # bspkrsCore block/item ID dump (122 KB)
    "config/jeresources/world-gen.json",         # JER worldgen scan dump (133 KB)
    "config/codechicken/supporters.json",        # CCL patreon supporters cache
    "config/codechicken/supporters.marker",      # CCL supporters timestamp
    "config/AppliedEnergistics2/CustomRecipes.cfg", # AE2 stale CSV-export digest cache

    # Documentation / marketing files -- not config at all.
    "config/AE2Stuff/readme.txt",
    "config/xaeropatreon.txt",
    "config/AppliedEnergistics2/VersionChecker.cfg", # version-checker cache, lastCheck=2020

    # Empty-or-default JEI scaffolding regenerated on first launch.
    "config/jei/searchColors.cfg",
    "config/jei/jei.cfg",
    "config/jei/worldSettings.cfg",
    "config/jei/itemBlacklist.cfg",

    # Pure mod defaults (all visible toggles match stock jar values).
    "config/codechickenlib.cfg",
    "config/multipart.cfg",
    "config/microblocks.cfg",
    "config/chisel.cfg",
    "config/ctm.cfg",
    "config/foamfix.cfg",
    "config/phosphor.json",
    "config/betterchat.cfg",                     # empty file
    "config/buildcraft/main.cfg",
    "config/buildcraft/detailed.properties",     # mod regenerates each launch
    "config/AppliedEnergistics2/AppliedEnergistics2.cfg",
    "config/AppliedEnergistics2/extracells.cfg",
    "config/AppliedEnergistics2/Facades.cfg",
    "config/malisiscore.cfg",
    "config/malisisdoors.cfg",
    "config/ironchest.cfg",
    "config/jeibees.cfg",
    "config/VariedCommodities.cfg",
    "config/gravisuite.cfg",
    "config/worldcontrol.cfg",
    "config/worldeditcuife2.cfg",
    "config/energycontrol.cfg",
    "config/energyconverters.cfg",
    "config/bspkrscore.cfg",
    "config/splash.properties",

    # User keybind state -- never ship.
    "config/ichunutil_keybinds.cfg",

    # Forestry gamemode presets -- mod recreates EASY/HARD/OP from jar
    # defaults if missing; NORMAL is the only one SC tweaked and stays.
    "config/forestry/gamemodes/EASY.cfg",
    "config/forestry/gamemodes/HARD.cfg",
    "config/forestry/gamemodes/OP.cfg",

    # Forestry sub-configs -- all toggles match Forestry defaults.
    "config/forestry/apiculture.cfg",
    "config/forestry/arboriculture.cfg",
    "config/forestry/farm.cfg",
    "config/forestry/fluids.cfg",
    "config/forestry/lepidopterology.cfg",

    # Waila stock themes -- regenerated from jar resources.
    "config/waila/theme/dark.json",
    "config/waila/theme/vanilla.json",

    # Railcraft -- everything except entities.cfg is stock RC.
    "config/railcraft/client.cfg",
    "config/railcraft/modules.cfg",
    "config/railcraft/railcraft.cfg",            # 21 KB of pure RC defaults

    # CoFH family -- everything except core/common.cfg (Soulbound off)
    # is stock CoFH.
    "config/cofh/world/config.cfg",
    "config/cofh/world/00_minecraft.json",
    "config/cofh/world/01_thermalfoundation_ores.json",
    "config/cofh/world/02_thermalfoundation_oil.json",
    "config/cofh/world/03_thermalfoundation_clathrates.json",
    "config/cofh/thermaldynamics/cover_blacklist.json",
    "config/cofh/core/client.cfg",
    "config/cofh/core/friends.cfg",              # empty
    "config/cofh/thermalexpansion/florbs.cfg",
    "config/cofh/thermalexpansion/morbs.cfg",
    "config/cofh/thermalexpansion/client.cfg",
    "config/cofh/thermalexpansion/common.cfg",   # 27 KB of pure TE defaults
    "config/cofh/thermalfoundation/client.cfg",
    "config/cofh/thermalfoundation/common.cfg",  # 16 KB of pure TF defaults
    "config/cofh/thermalfoundation/lexicon-whitelist.cfg",
    "config/cofh/thermalcultivation/client.cfg",
    "config/cofh/thermalcultivation/common.cfg",
    "config/cofh/thermaldynamics/client.cfg",
    "config/cofh/thermaldynamics/common.cfg",
    "config/cofh/thermalinnovation/client.cfg",
    "config/cofh/thermalinnovation/common.cfg",
    "config/cofh/redstonearsenal/client.cfg",
    "config/cofh/redstonearsenal/common.cfg",
]

# ── generate: hidemymods spoof file ─────────────────────────────────────
# Emits <storage>/packs/Industrial/static/hidemymods-spoof.json from
# the explicit modid -> version table below. apply-curator adds a
# matching smrt_static asset entry so the launcher syncs the file
# into <clientDir>/hidemymods-spoof.json. The hidemymods coremod
# reads it at FML handshake time and rewrites the wire ModList so
# our pack can ship a divergent set without breaking SC's check.
#
# CRITICAL: this table describes SC's SERVER-side required modlist
# (what SC's wire FMLHandshakeMessage$ModList carries), NOT the
# contents of our mirror pack. The Hivens-rework pack already
# diverges from SC canonical: extra cozy mods on top, open-smrt-
# network in place of Smarty, library swaps. Auto-extracting modid
# + version from our jars would produce values that DO NOT MATCH
# what SC expects, and the server would reject the handshake.
#
# Re-validation: extract a fresh wire ModList from a live SC join
# attempt (latest.log -> "Attempting connection with missing mods"
# line) whenever SC bumps the upstream pack; the shape is stable,
# the version strings move.
#
# Snapshot dated 2026-05-26: 57 entries.

[generate]
hidemymods          = true
hidemymods_filename = "hidemymods-spoof.json"

[generate.hidemymods_entries]
"ae2stuff"                = "0.7.0.5-DEV"
"advanced_machines"       = "61.0.1"
"advanced_solar_panels"   = "4.3.0"
"appliedenergistics2"     = "rv6-stable-7"
"autoreglib"              = "1.3-33"
"bcfuelsforic2"           = "1.0"
"bdlib"                   = "1.14.3.12"
"bspkrscore"              = "7.6.0.1"
"buildcraftcore"          = "7.99.24.6"
"buildcraftbuilders"      = "7.99.24.6"
"buildcraftcompat"        = "7.99.24.6"
"buildcraftenergy"        = "7.99.24.6"
"buildcraftfactory"       = "7.99.24.6"
"buildcraftlib"           = "7.99.24.6"
"buildcraftrobotics"      = "7.99.24.6"
"buildcraftsilicon"       = "7.99.24.6"
"buildcrafttransport"     = "7.99.24.6"
"chisel"                  = "MC1.12.2-1.0.2.45"
"codechickenlib"          = "3.2.3.358"
"cofhcore"                = "4.6.6"
"customnpcs"              = "1.12"
"energycontrol"           = "1.12.2-0.0.9"
"energyconverters"        = "1.3.7.30"
"extracells"              = "2.6.5"
"forestry"                = "5.8.2.0"
"forgemultipartcbe"       = "2.6.2.83"
"gravisuite"              = "3.1.1"
"hats"                    = "7.1.0"
"hatstand"                = "7.1.0"
