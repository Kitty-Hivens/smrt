# /etc/nginx/sites-available/smrt.conf
# Symlink into /etc/nginx/sites-enabled/ to activate.
#
# Run `certbot --nginx -d smrt.hivens.dev` once to issue and wire the
# TLS certificate; certbot will edit the listen 443 block in-place
# with the actual ssl_certificate / ssl_certificate_key paths.

server {
    listen 80;
    listen [::]:80;
    server_name smrt.hivens.dev;

    # certbot needs port 80 for HTTP-01 challenge; redirect everything
    # else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smrt.hivens.dev;

    # certbot fills these:
    # ssl_certificate     /etc/letsencrypt/live/smrt.hivens.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/smrt.hivens.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Ceiling on a single upload. Matched to the app's MAX_UPLOAD_BODY (8 GiB):
    # the smaller of nginx and the app wins, so raising one without the other
    # just moves the wall. Sized for a whole SC pack archive bootstrapped in one
    # request; ordinary jar/asset uploads are 5-50 MB. Reads are KB-scale.
    client_max_body_size 8G;

    # Mod jars are content-addressed by sha1 -- immutable, cache hard.
    location ~ ^/v1/cache/[a-f0-9]{2}/[a-f0-9]{40}\.jar$ {
        proxy_pass http://127.0.0.1:9000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }
}
