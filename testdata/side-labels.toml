# Golden side/policy labels for the corpus jars (docs/side-required-audit.md).
# Ground truth for the D-stage bytecode classifier and the F-stage presence
# categories. sha1 pins the exact artifact; jars live outside the repo and are
# re-fetchable with testdata/corpus/fetch.py.
#
# side: client | server | both        (axis A)
# policy: must_match | tolerant       (axis B; must_match = both sides need it to join)
# kind: mod | coremod_with_mod | library
# category: required | optional_client | optional_server | optional_both | coremod
#
# optional_server and coremod are under-represented in the two published packs;
# stage D tops these categories up with fetched reference jars + synthetic classes.

